<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>EduExchange Marketplace</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>

<div class="page-frame">

  <h1>EduExchange</h1>

  <nav>
    <a href="login.html">Login</a>
    <a href="create-listing.html">Create Listing</a>
    <a href="signup.html">Sign Up</a>
    <button id="viewWishlistBtn">♥ My Wishlist</button>
  </nav>

  <div class="container">

    <h2>Browse Listings</h2>

    <!-- FILTERS -->
    <div class="filters">
      <select id="categoryFilter">
        <option value="All">All Categories</option>
        <option value="Textbooks">Textbooks</option>
        <option value="Electronics">Electronics</option>
        <option value="Clothing">Clothing</option>
        <option value="Furniture">Furniture</option>
        <option value="Other">Other</option>
      </select>

      <input type="number" id="priceFilter" placeholder="Max Price">

      <select id="conditionFilter">
        <option value="All">All Conditions</option>
        <option value="New">New</option>
        <option value="Used">Used</option>
        <option value="Like New">Like New</option>
      </select>

      <button id="applyFiltersBtn">Apply Filters</button>
    </div>

    <!-- DYNAMIC LISTINGS -->
    <div class="grid" id="listingsGrid"></div>

  </div>

</div>

<!-- LISTING MODAL -->
<div id="listingModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>

    <h2 id="modalTitle"></h2>
    <p id="modalPrice"></p>
    <p id="modalDescription"></p>

    <button id="messageBtn">Message Seller</button>
    <button id="reportBtn">Report Listing</button>
  </div>
</div>

<!-- CHAT MODAL -->
<div id="chatModal" class="modal">
  <div class="modal-content">
    <span class="close-chat">&times;</span>

    <h2>Chat with Seller</h2>

    <div id="chatBox" class="chat-box">
      <p><strong>Seller:</strong> Hi! Is this still available?</p>
    </div>

    <input type="text" id="chatInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- REPORT MODAL -->
<div id="reportModal" class="modal">
  <div class="modal-content">
    <span class="close-report">&times;</span>

    <h2>Report Listing</h2>
    <select id="reportReason">
      <option value="">Select a reason</option>
      <option value="Inappropriate Listing">Inappropriate Listing</option>
      <option value="Scam">Scam</option>
      <option value="Duplicate Listing">Duplicate Listing</option>
      <option value="Other">Other</option>\
    </select>
    <textarea id="reportDetails" placeholder="Describe the issue..."></textarea>
    <button onclick="submitReport()">Submit Report</button>
  </div>
</div>

<!-- REPORT CONFIRMATION MODAL -->
<div id="reportConfirmationModal" class="modal">
  <div class="modal-content">
    <span class="close-report-confirmation">&times;</span>

    <h2>Report Submitted</h2>
    <p>Thank you for your report. Our team will review it shortly.</p>
  </div>
</div>

<!-- WISHLIST MODAL -->
<div id="wishlistModal" class="modal">
  <div class="modal-content">
    <span class="close-wishlist">&times;</span>

    <h2>♥ My Saved Listings</h2>

    <div id="wishlistItems"></div>
  </div>
</div>

</body>
</html>
