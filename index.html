<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>EduExchange Marketplace</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>

<div class="page-frame">

  <h1>EduExchange</h1>

  <nav>
    <a href="login.html">Login</a>
    <a href="create-listing.html">Create Listing</a>
    <a href="signup.html">Sign Up</a>
  </nav>

  <div class="container">

    <h2>Browse Listings</h2>

    <!-- FILTERS -->
    <div class="filters">
      <select id="categoryFilter">
        <option value="All">All Categories</option>
        <option value="Textbooks">Textbooks</option>
        <option value="Electronics">Electronics</option>
        <option value="Clothing">Clothing</option>
        <option value="Furniture">Furniture</option>
        <option value="Other">Other</option>
      </select>

      <input type="number" id="priceFilter" placeholder="Max Price">

      <select id="conditionFilter">
        <option value="All">All Conditions</option>
        <option value="New">New</option>
        <option value="Used">Used</option>
        <option value="Like New">Like New</option>
      </select>

      <button id="applyFiltersBtn">Apply Filters</button>
    </div>

    <!-- DYNAMIC LISTINGS -->
    <div class="grid" id="listingsGrid"></div>

  </div>

</div>

<!-- LISTING MODAL -->
<div id="listingModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>

    <h2 id="modalTitle"></h2>
    <p id="modalPrice"></p>
    <p id="modalDescription"></p>

    <button id="messageBtn">Message Seller</button>
  </div>
</div>

<!-- CHAT MODAL -->
<div id="chatModal" class="modal">
  <div class="modal-content">
    <span class="close-chat">&times;</span>

    <h2>Chat with Seller</h2>

    <div id="chatBox" class="chat-box">
      <p><strong>Seller:</strong> Hi! Is this still available?</p>
    </div>

    <input type="text" id="chatInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

</body>
</html>
